<!DOCTYPE html>
<html>
<head>
  <title>Greenhouse AI Assistant</title>
  <script src="https://js.puter.com/v2/"></script>

  <style>
    :root {
      --bg: #050814;
      --panel: rgba(7, 18, 28, 0.96);
      --accent: #66bb6a;
      --text-main: #f1f8e9;
      --text-muted: #b0bec5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b5e20 0, #050814 55%, #000000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .shell {
      width: 100%;
      max-width: 800px;
      background: var(--panel);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 18px 18px 14px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .title {
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tagline {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .back-button {
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      border: none;
      background: rgba(3, 155, 229, 0.12);
      color: #81d4fa;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #chatMessages {
      flex: 1;
      min-height: 260px;
      max-height: 440px;
      overflow-y: auto;
      border-radius: 14px;
      padding: 14px 14px 10px;
      background: radial-gradient(circle at top left, rgba(102,187,106,0.18), rgba(2,7,10,0.9));
      border: 1px solid rgba(255,255,255,0.04);
      margin-bottom: 10px;
    }

    .msg {
      margin-bottom: 8px;
      max-width: 82%;
      padding: 9px 11px;
      border-radius: 13px;
      font-size: 13px;
      line-height: 1.35;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .user {
      background: linear-gradient(135deg, #1e88e5, #42a5f5);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: linear-gradient(135deg, #2e7d32, #66bb6a);
      border-bottom-left-radius: 4px;
    }

    .from-label {
      display: block;
      font-size: 10px;
      opacity: 0.85;
      margin-bottom: 2px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    #userInput {
      flex: 1;
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(3, 15, 20, 0.95);
      color: var(--text-main);
      font-size: 13px;
      outline: none;
    }

    #userInput::placeholder {
      color: var(--text-muted);
    }

    .send-button {
      padding: 9px 15px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: white;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 6px 16px rgba(76,175,80,0.55);
    }

    .send-button[disabled] {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    .status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="top-bar">
      <div>
        <div class="title">🤖 Greenhouse AI Assistant</div>
        <div class="tagline">Ask about plant care, climate settings and sensor readings</div>
      </div>
      <button class="back-button" onclick="window.location.href='index.html'">
        ⬅ Back to dashboard
      </button>
    </div>

    <div id="chatMessages"></div>

    <div class="input-row">
      <input id="userInput" placeholder="Ask something like: 'How should I adjust humidity for tomatoes?'" />
      <button class="send-button" id="sendBtn" onclick="sendMessage()">
        Send
      </button>
    </div>
    <div class="status" id="statusText">Model: gpt-4o-mini via Puter.js</div>
  </div>

  <script>
    // --- Supabase config (same table as dashboard) ---
    const SUPABASE_URL = "https://huuhwcjigxymbtnbtpnl.supabase.co/rest/v1/sensor_data?select=*";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWh3Y2ppZ3h5bWJ0bmJ0cG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzgzOTIsImV4cCI6MjA4ODcxNDM5Mn0.uwvw84nENHg--kyH6gtLxmnI7ZdAWdKfOV1OU1HPwv0"; // put your anon key here

    async function getCurrentReadings() {
      try {
        const res = await fetch(SUPABASE_URL, {
          headers: {
            apikey: API_KEY,
            Authorization: "Bearer " + API_KEY
          }
        });

        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
          return null;
        }

        const latest = data[data.length - 1];
        return {
          temperature: latest.temperature,
          humidity: latest.humidity,
          light: latest.light
        };
      } catch (e) {
        console.error(e);
        return null;
      }
    }

    // --- Chat UI + AI ---
    const chat = document.getElementById("chatMessages");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");

    function appendMessage(text, from) {
      const div = document.createElement("div");
      div.className = "msg " + (from === "user" ? "user" : "bot");
      const label = from === "user" ? "You" : "AI";
      div.innerHTML = `<span class="from-label">${label}</span>${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage(){
      const message = input.value.trim();
      if (!message) return;

      appendMessage(message, "user");
      input.value = "";
      sendBtn.disabled = true;
      statusText.textContent = "Fetching data + thinking…";

      try {
        // 1) Get latest sensor readings from Supabase
        const readings = await getCurrentReadings();

        let context = "";
        if (readings) {
          context =
            `Current greenhouse readings: ` +
            `Temperature ${readings.temperature}°C, ` +
            `Humidity ${readings.humidity}%, ` +
            `Light ${readings.light} lux.`;
        } else {
          context = "Current greenhouse readings are unavailable right now.";
        }

        // 2) Ask Puter.js AI, including the readings
        const reply = await puter.ai.chat(
          "You are a greenhouse expert helping a beginner grow plants. " +
          "Use the live sensor readings if provided.\n\n" +
          context + "\n\nUser question: " + message,
          { model: "gpt-4o-mini", stream: false }
        );

        appendMessage(reply, "bot");
        statusText.textContent = "Model: gpt-4o-mini via Puter.js";
      } catch (err) {
        console.error(err);
        appendMessage("Sorry, something went wrong. Please try again.", "bot");
        statusText.textContent = "Error. Check your internet connection.";
      } finally {
        sendBtn.disabled = false;
      }
    }

    input.addEventListener("keydown", e => {
      if(e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
